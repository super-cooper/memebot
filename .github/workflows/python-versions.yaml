---
name: Verify Python Versions

on:
  push:
    branches: ["master"]
    paths:
      - "docker/*"
      - "pyproject.toml"
  pull_request:
    branches: ["master"]
    paths:
      - "docker/*"
      - "pyproject.toml"

jobs:
  verify-python-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-uv@v7

      - name: Verify Python versions
        run: |
          uv run verify_python_versions.py docker/Dockerfile pyproject.toml
