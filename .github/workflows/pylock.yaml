---
# Assisted by Claude Sonnet 4.6
name: Update pylock.toml on push to master

on:
  push:
    branches: ["master"]
    paths:
      - "pyproject.toml"
  workflow_dispatch:

concurrency:
  group: update-lockfile-master
  cancel-in-progress: false

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out triggering commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Regenerate pylock.toml
        run: |
          uv venv
          uv pip install --upgrade pip
          uv run pip lock . --group dev

      - name: Commit updated pylock.toml if changed
        uses: planetscale/ghcommit-action@v0
        with:
          commit_message: "Regenerate pylock.toml after ${{ github.sha }}"
          repo: ${{ github.repository }}
          branch: master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
