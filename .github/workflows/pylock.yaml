---
# Assisted by Claude Sonnet 4.6
name: Update pylock.toml

on:
  pull_request_target:
    branches: ["master"]
    paths:
      - "pyproject.toml"
      - ".github/workflows/pylock.yaml"

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out the PR branch
        uses: actions/checkout@v6
        with:
          # Check out the actual PR branch, not the base branch.
          # pull_request_target checks out the base by default.
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: astral-sh/setup-uv@v7

      - name: Regenerate pylock.toml
        run: |
          uv venv
          uv pip install --upgrade pip
          uv run pip lock . --group dev

      - name: Commit updated pylock.toml if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pylock.toml
          # Only commit if there are staged changes
          git diff --cached --quiet || git commit -m "Regenerate pylock.toml after ${{ github.sha }} [dependabot skip]"
          git push
